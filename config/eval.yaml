# Apex RAG evaluation configuration

ragas:
  metrics:
    - context_recall
    - context_precision
    - faithfulness
    - answer_relevance
    - answer_correctness
  llm_judge:
    backend: ollama
    model: llama3.1:8b-instruct-q4_K_M
  embedding:
    backend: sentence_transformers
    model: BAAI/bge-base-en-v1.5

dataset:
  golden_path: data/eval_golden.json
  baseline_path: data/eval_baseline.json
  results_dir: data/eval_runs

regression:
  enabled: true
  threshold: 0.05         # fail CI on >5% drop on any tracked metric
  tracked_metrics:
    - faithfulness
    - context_recall
    - answer_relevance

drift:
  enabled: true
  window_days: 7
  ks_p_value_threshold: 0.05

benchmark:
  variants:
    - id: naive
      description: "Single-vector dense top-k only"
      hybrid: false
      rerank: false
      rewrite: none
      top_k: 5
    - id: apex
      description: "Hybrid + HyDE + cross-encoder rerank + agent"
      hybrid: true
      rerank: true
      rewrite: hyde
      top_k: 20

phoenix:
  endpoint: http://localhost:6006/v1/traces
  project: apex-rag
